site_name: Dragon / Donjon
docs_dir: docs
nav:
    - 'Home': index.md
    - 'User Guides':
        - Dragon User Guide: IGE335.md
        - Donjon User Guide: IGE344.md
        - Trivac User Guide: IGE369.md
    - 'Developer Documentation':
        - 'Dragon and Trivac Data Structures': IGE351.md
        - 'Ganlib': IGE332.md
    - 'Source Code': 'https://git.oecd-nea.org/dragon/5.1'
    - 'Issue Tracker': 'https://git.oecd-nea.org/dragon/5.1/-/issues'
theme:
  name: mkdocs
  highlightjs: true
  favicon: images/favicon.ico


markdown_extensions:
  - attr_list
  - md_in_html

plugins:
    - search
    - gen-files:
        scripts:
            - .nea/mkdocs/pre_build.py


